services:
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: mat-frontend
    ports:
      - "9000:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: mat-backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET:-YourSuperSecretKeyThatShouldBeAtLeast32CharactersLong!}
      - Jwt__Secret=${JWT_SECRET:-YourSuperSecretKeyThatShouldBeAtLeast32CharactersLong!}
      - Jwt__Issuer=WorkshopApi
      - Jwt__Audience=WorkshopApp
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - ASPNETCORE_ENVIRONMENT=Production
    restart: unless-stopped
